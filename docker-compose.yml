services:
  db:
    image: postgres:16
    container_name: noxis-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: noxis
    ports:
      - "5432:5432"
    volumes:
      - noxis_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d noxis"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: noxis-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:1234@db:5432/noxis?schema=public
      NODE_ENV: production
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  noxis_postgres_data:
