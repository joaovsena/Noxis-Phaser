services:
  db:
    image: postgres:16
    container_name: noxis-db-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: noxis_dev
    ports:
      - "5433:5432"
    volumes:
      - noxis_postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d noxis_dev"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: noxis-app-dev
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:1234@db:5432/noxis_dev?schema=public
      NODE_ENV: development
      PORT: 3001
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - noxis_node_modules_dev:/app/node_modules
    command: >
      sh -c "
      until npx prisma db push --skip-generate; do
        echo '[dev] aguardando banco...';
        sleep 2;
      done &&
      npx prisma generate &&
      npx nodemon -L --watch server --ext ts --exec 'ts-node server/index.ts'
      "
    restart: unless-stopped

volumes:
  noxis_postgres_dev_data:
  noxis_node_modules_dev:
